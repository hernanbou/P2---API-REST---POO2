spring.application.name=painel-propostas-bndes

server.port=8080

spring.datasource.url=jdbc:h2:mem:bndesdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jackson.serialization.write-dates-as-timestamps=false

app.cors.allowed-origin-patterns=http://localhost:*,http://127.0.0.1:*

bndes.api.base-url=${BNDES_API_BASE_URL:https://apis-gateway.bndes.gov.br/pme/1.4}
bndes.api.token-url=${BNDES_TOKEN_URL:https://apis-gateway.bndes.gov.br/token}
bndes.api.enable-real-post=${BNDES_ENABLE_REAL_POST:false}
bndes.api.use-mock-on-failure=${BNDES_USE_MOCK_ON_FAILURE:true}
bndes.auth.refresh-rate-ms=${BNDES_TOKEN_REFRESH_RATE_MS:3600000}
